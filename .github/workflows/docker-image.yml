name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write #needed for committing to CD repo iif using GITHUB_TOKEN

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js (LTS recommended)
        uses: actions/setup-node@v5
        with:
          node-version: '22' # use 23 if you truly need it

      - name: Frontend Compilation (Syntax Check)
        run: |
          cd client || exit 0
          find . -name "*.js" -exec node --check {} + || exit 1

      - name: Backend Compilation (Syntax Check)
        run: |
          cd api || exit 0
          find . -name "*.js" -exec node --check {} + || exit 1

  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2
      - name: Gitleaks Scan
        run:
          gitleaks detect --source ./client --exit-code 1
          gitleaks detect --source ./api --exit-code 1

  trivy_fs_scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run Trivy vulnerability scanner (FS)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  build_backend_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: trivy_fs_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Docker image (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags:
            bapaksukareview/backend:latest
            bapaksukareview/backend:${{ env.IMAGE_TAG }}

  build_frontend_docker_image_and_push:
      runs-on: ubuntu-latest
      needs: trivy_fs_scan
      steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Docker image (frontend)
        uses: docker/build-push-action@v6 
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags:
            bapaksukareview/frontend:latest
            bapaksukareview/frontend:${{ env.IMAGE_TAG }}

  trivy_image_scan:
      runs-on: ubuntu-latest
      needs:
        - build_backend_docker_image_and_push
        - build_frontend_docker_image_and_push
      steps:
        - name: Checkout (noop, keeps workspace consistent)
          uses: action/checkout@v5
        - name: Run Trivy image scan for backend
          uses: aquasecurity/trivy-action@v0.24.0
          with:
            scan-type: image
            image-ref: bapaksukareview/backend:${{ env.IMAGE_TAG }}
            format: table
            exit-code: '0'
            ignore-unfixed: true
            vuln-type: os,library
            severity: CRITICAL,HIGH
        - name: Run Trivy image scan for frontend
          uses: aquasecurity/trivy-action@v0.24.0
          with:
            scan-type: image
            image-ref: bapaksukareview/frontend:${{ env.IMAGE_TAG }}
            format: table
            exit-code: '0'
            ignore-unfixed: true
            vuln-type: os,library
            severity: CRITICAL,HIG

  update_cd_repo:
      runs-on: ubuntu-latest
      needs: trivy_image_scan
      steps:
        - name: Checkout CD repo
          uses: actions/checkout@v5
          with:
            repository: bapaksukareview/3-Tier-GitOps-CD
            ref: main
            token: $ {{ secrets.CD_REPO_TOKEN }}
            path: cd

        - name: Bump images in manifests
          working-directory: cd
          run: |
            curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o yq && sudo install yq /usr/local/bin/yq
            yq -i '(.spec.template.spec.containers[] | select(.name=="backend")).image = "bapaksukareview/backend:" + strenv(IMAGE_TAG)' k8-prod/backend.yaml
            yq -i '(.spec.template.spec.containers[] | select(.name=="frontend")).image = "bapaksukareview/frontend:" + strenv(IMAGE_TAG)' k8-prod/frontend.yaml

        - name: Commit & push to CD repo
          working-directory: cd
          run: |
            git config user.name "ci-bot"
            git config user.email "ci-bot@users.noreply.github.com"
            git add -A
            git commit -m "bump images to ${IMAGE_TAG}" || echo "no changes"
            git push
